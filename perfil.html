<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LíShop</title>
    <link rel="stylesheet" href="./CSS/base.css">
    <link rel="stylesheet" href="./CSS/component.css">
    <link rel="stylesheet" href="./CSS/layout.css">
    <link rel="stylesheet" href="CSS/responsive.css">
</head>
<body>
    <header class="main-header">
    <a href="index.html" class="back-link">← Inicio</a>
    <img src="./IMG/logo.png" alt="LíSel logo Company">
    <a href="index.html" class="none-decoration-text">
        <div class="logo">
            <p>Lí<span>Shop</span></p>
        </div>
    </a></header>
<main class="profile-container">
    <section class="profile-hero">
        <div class="profile-avatar">
            <img src="./IMG/avatar.png" alt="Foto de perfil">
        </div>
        <div class="profile-welcome">
            <h1>Hola, Joel</h1>
            <p>Hombre de Negocios</p>
        </div>
    </section>

    <section class="profile-menu">
        <a href="historial.html" class="menu-item">
            <div class="menu-item-info">
                <div class="profile-icon">
                    <img src="./IMG/pedidos.png" alt="Pedidos">
                </div>
                <div>
                    <h3>Mis Pedidos</h3>
                    <p>Rastrea y revisa tus compras</p>
                </div>
            </div>
            <span class="arrow">→</span>
        </a>
    
        <a href="checkout.html" class="menu-item">
            <div class="menu-item-info">
                <div class="profile-icon">
                    <img src="./IMG/map.png" alt="Direcciones">
                </div>
                <div>
                    <h3>Direcciones</h3>
                    <p>Gestiona tus puntos de entrega en el campus</p>
                </div>
            </div>
            <span class="arrow">→</span>
        </a>
    
        <a href="#" class="menu-item">
            <div class="menu-item-info">
                <div class="profile-icon">
                    <img src="./IMG/confi.png" alt="Configuración">
                </div>
                <div>
                    <h3>Configuración</h3>
                    <p>Privacidad y notificaciones</p>
                </div>
            </div>
            <span class="arrow">→</span>
        </a>
    
        <button class="btn-logout">Cerrar Sesión</button>
    </section>
</main>
</body>
</html>
