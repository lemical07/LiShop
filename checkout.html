<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout.LíShop</title>
    <link rel="stylesheet" href="./CSS/base.css">
    <link rel="stylesheet" href="./CSS/component.css">
    <link rel="stylesheet" href="./CSS/layout.css">
    <link rel="stylesheet" href="CSS/responsive.css">
</head>
<body>
    <header class="main-header">
    <a href="carrito.html" class="back-link">← Volver al carrito</a>

    <img src="./IMG/logo.png" alt="LíSel logo Company">
            <a href="index.html" class="none-decoration-text">
                <div class="logo">
                    <p>Lí<span>Shop</span></p>
                </div>
            </a>
</header>

<main class="checkout-container">
    <h1>Finalizar Compra</h1>

    <form class="checkout-layout">
        <section class="checkout-form">
            <div class="form-section">
                <h3><span class="step">1</span> Información de Entrega</h3>
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" placeholder="Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label for="edificio">Edificio / Facultad</label>
                    <input type="text" id="edificio" placeholder="Edificio T-3, Ingeniería" required>
                </div>
            </div>

            <div class="form-section">
                <h3><span class="step">2</span> Método de Pago</h3>
                <div class="payment-options">
                    <label class="payment-card">
                        <input type="radio" name="payment" checked>
                        <span>Tarjeta de Crédito/Débito</span>
                    </label>
                    <label class="payment-card">
                        <input type="radio" name="payment">
                        <span>Pago contra entrega (LíCompany)</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label for="card">Número de Tarjeta</label>
                    <input type="text" id="card" placeholder="0000 0000 0000 0000">
                </div>
            </div>
        </section>

        <aside class="checkout-summary">
            <h3>Tu Pedido</h3>
            <div class="mini-item">
                <p>Inverness Cape</p>
                <span>11,500 GTQ</span>
            </div>
            <div class="mini-item">
                <p>Polo Coat</p>
                <span>17,000 GTQ</span>
            </div>
            <hr>
            <div class="total-row">
                <span>Total a pagar</span>
                <span class="total-price">28,000 GTQ</span>
            </div>
            <button type="submit" class="btn-add-to-cart">Confirmar y Pagar</button>
        </aside>
    </form>
</main>
</body>
</html>
