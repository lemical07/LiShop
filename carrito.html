<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito.LíShop</title>
    <link rel="stylesheet" href="./CSS/base.css">
    <link rel="stylesheet" href="./CSS/component.css">
    <link rel="stylesheet" href="./CSS/layout.css">
    <link rel="stylesheet" href="CSS/responsive.css">
</head>
<body>
    <header class="main-header header-cart">
        <div class="header-container">
            <a href="catalogo.html" class="back-link">
                <span>←</span> Continuar comprando
            </a>
                <img src="./IMG/logo.png" alt="LíSel logo Company">
                    <a href="index.html" class="none-decoration-text">
                <div class="logo">
                    <p>Lí<span>Shop</span></p>
                </div>
            </a>
        </div>
    </header>

<main class="cart-container">
    <a href="vacio.html" class="none-decoration-text">
        <h1>Tu Carrito</h1>
    </a>
    <div class="cart-layout">
        <section class="cart-items">
            <article class="cart-item">
                <img src="./IMG/InvernessCape.png" alt="Producto" class="cart-item-img">
                <div class="cart-item-details">
                    <h3>Inverness Cape</h3>
                    <p class="cart-item-price">11,500 GTQ</p>
                    <div class="cart-item-actions">
                        <span class="qty-sim">Cant: 1</span>
                        <button class="btn-remove">Eliminar</button>
                    </div>
                </div>
            </article>

            <article class="cart-item">
                <img src="./IMG/Polo-Coat.png" alt="Producto" class="cart-item-img">
                <div class="cart-item-details">
                    <h3>Polo Coat</h3>
                    <p class="cart-item-price">17,000 GTQ</p>
                    <div class="cart-item-actions">
                        <span class="qty-sim">Cant: 1</span>
                        <button class="btn-remove">Eliminar</button>
                    </div>
                </div>
            </article>
        </section>

        <aside class="cart-summary">
            <h2>Resumen</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span>28,000 GTQ</span>
            </div>
            <div class="summary-row">
                <span>Envío LíCompany</span>
                <span class="free-shipping">Gratis</span>
            </div>
            <hr>
            <div class="summary-row total">
                <span>Total</span>
                <span>28,500 GTQ</span>
            </div>
            <a href="checkout.html" class="btn-add-to-cart">Finalizar Pedido</a>
        </aside>
    </div>
</main>
</body>
</html>
